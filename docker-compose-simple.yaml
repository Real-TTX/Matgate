name: matgate-simple

x-home-dns: &home-dns
  dns:
    - ${MATGATE_DNS_SERVER:-10.10.0.1}
  dns_search:
    - ${MATGATE_DNS_SEARCH:-Schmoldt.local}

services:
  caddy:
    <<: *home-dns
    image: caddy:2
    depends_on:
      - matgate
      - guacamole
    ports:
      - "8088:8088"
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf "%s\n" \
          ":8088 {" \
          "  encode zstd gzip" \
          "  handle /guacamole* {" \
          "    reverse_proxy guacamole:8080" \
          "  }" \
          "  handle {" \
          "    reverse_proxy matgate:8080" \
          "  }" \
          "}" > /tmp/Caddyfile && \
        exec caddy run --config /tmp/Caddyfile --adapter caddyfile
    restart: unless-stopped

  matgate:
    <<: *home-dns
    image: ghcr.io/real-ttx/matgate:latest
    pull_policy: always
    environment:
      ASPNETCORE_URLS: http://+:8080
      MATGATE_DATA_DIR: /data
      MATGATE_ADMIN_USER: ${MATGATE_ADMIN_USER:-admin}
      MATGATE_ADMIN_PASSWORD: ${MATGATE_ADMIN_PASSWORD:-change-me-now}
      Guacamole__JsonSecretKey: ${MATGATE_GUACAMOLE_JSON_SECRET_KEY:-0123456789abcdeffedcba9876543210}
      Guacamole__PublicBasePath: /guacamole
      Guacamole__DirectLaunch: "true"
    volumes:
      - type: volume
        source: data
        target: /data
    restart: unless-stopped

  guacd:
    <<: *home-dns
    image: guacamole/guacd:1.6.0
    restart: unless-stopped

  guacamole:
    <<: *home-dns
    image: guacamole/guacamole:1.6.0
    depends_on:
      - guacd
      - matgate
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: "4822"
      JSON_ENABLED: "true"
      JSON_SECRET_KEY: ${MATGATE_GUACAMOLE_JSON_SECRET_KEY:-0123456789abcdeffedcba9876543210}
    volumes:
      - type: volume
        source: data
        target: /etc/guacamole
    restart: unless-stopped

volumes:
  data:
    name: data
