name: matgate

services:
  edge:
    image: caddy:2
    depends_on:
      - matgate
      - guacamole
    ports:
      - "8088:8088"
    entrypoint:
      - /bin/sh
      - -c
      - |
        printf "%s\n" \
          ":8088 {" \
          "  encode zstd gzip" \
          "  handle /guacamole* {" \
          "    reverse_proxy guacamole:8080" \
          "  }" \
          "  handle {" \
          "    reverse_proxy matgate:8080" \
          "  }" \
          "}" > /tmp/Caddyfile && \
        exec caddy run --config /tmp/Caddyfile --adapter caddyfile
    restart: unless-stopped

  matgate:
    image: ghcr.io/real-ttx/matgate:latest
    pull_policy: always
    environment:
      ASPNETCORE_URLS: http://+:8080
      MATGATE_DATA_DIR: /data
      MATGATE_ADMIN_USER: admin
      MATGATE_ADMIN_PASSWORD: change-me-now
      Guacamole__JsonSecretKey: 0123456789abcdeffedcba9876543210
      Guacamole__PublicBasePath: /guacamole
      Guacamole__DirectLaunch: "true"
    volumes:
      - matgate_data:/data
    restart: unless-stopped

  guacd:
    image: guacamole/guacd:1.6.0
    restart: unless-stopped

  guacamole:
    image: guacamole/guacamole:1.6.0
    depends_on:
      - guacd
      - matgate
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: "4822"
      JSON_ENABLED: "true"
      JSON_SECRET_KEY: 0123456789abcdeffedcba9876543210
    volumes:
      - matgate_data:/etc/guacamole
    restart: unless-stopped

volumes:
  matgate_data:
